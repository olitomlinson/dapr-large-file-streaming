user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Disable gzip for downloads to avoid buffering
    gzip  off;

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        # Proxy download requests to Dapr sidecar for service invocation
        location /download/large-file {
            # Docker DNS resolver
            resolver 127.0.0.11 valid=30s;

            # Critical streaming settings - no buffering
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            chunked_transfer_encoding on;

            # Preserve query parameters and pass to Dapr service invocation
            proxy_pass http://nginx-dapr:3500/v1.0/invoke/file-generator/method/generate-file$is_args$args;

            # Headers for streaming
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Extended timeout for large file transfers
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
