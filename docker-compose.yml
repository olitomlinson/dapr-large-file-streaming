version: "3.4"
services:
  ############################
  # Dapr Placement Service - Required by Dapr
  ############################
  placement:
    image: "${DAPR_PLACEMENT_VERSION}"
    command: ["./placement", "-port", "50005", "-log-level", "warn"]
    networks:
      - network
    ports:
      - "50005:50005"

  ############################
  # Dapr Scheduler Service - Required by Dapr
  ############################
  scheduler-0:
    image: "${DAPR_SCHEDULER_VERSION}"
    command:
      [
        "./scheduler",
        "--id",
        "scheduler-0",
        "--listen-address",
        "0.0.0.0",
        "--etcd-data-dir",
        "/var/run/dapr/scheduler",
        "--etcd-initial-cluster",
        "scheduler-0=http://scheduler-0:2380",
        "--port",
        "50006",
        "--override-broadcast-host-port",
        "scheduler-0:50006",
      ]
    volumes:
      - ./dapr_scheduler/0:/var/run/dapr/scheduler
    networks:
      - network
    ports:
      - "50006:50006"
      - "2380:2380"

  ############################
  # Chunk Sender (Caller) - Sends large payloads
  ############################
  chunk-sender:
    environment:
      - DAPR_GRPC_ENDPOINT=http://chunk-sender-dapr:50001
      - DAPR_HTTP_ENDPOINT=http://chunk-sender-dapr:3500
    build:
      context: ./chunk-sender
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      chunk-sender-dapr:
        condition: service_started
    networks:
      - network

  chunk-sender-dapr:
    image: "${DAPR_RUNTIME_VERSION}"
    ports:
      - "3502:3500" # Dapr HTTP port
      - "50003:50001" # Dapr gRPC port
    command:
      [
        "./daprd",
        "-app-id",
        "chunk-sender",
        "-app-channel-address",
        "chunk-sender",
        "-app-port",
        "8001",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-placement-host-address",
        "placement:50005",
        "-scheduler-host-address",
        "scheduler-0:50006",
        "-resources-path",
        "/components",
        "-config",
        "/dapr-config/config.yml",
        "-log-level",
        "info",
        "-max-body-size",
        "2Gi",
      ]
    volumes:
      - "./components/:/components"
      - "./dapr-config/:/dapr-config"
    depends_on:
      placement:
        condition: service_started
      scheduler-0:
        condition: service_started
    networks:
      - network

  ############################
  # Chunk Receiver (Callee) - Receives large payloads
  ############################
  chunk-receiver:
    environment:
      - DAPR_GRPC_ENDPOINT=http://chunk-receiver-dapr:50001
      - DAPR_HTTP_ENDPOINT=http://chunk-receiver-dapr:3500
    build:
      context: ./chunk-receiver
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      chunk-receiver-dapr:
        condition: service_started
    networks:
      - network
    volumes:
      - /tmp:/tmp # Mount /tmp for file writing

  chunk-receiver-dapr:
    image: "${DAPR_RUNTIME_VERSION}"
    ports:
      - "3503:3500" # Dapr HTTP port
      - "50004:50001" # Dapr gRPC port
    command: [
        "./daprd",
        "-app-id",
        "chunk-receiver",
        "-app-channel-address",
        "chunk-receiver",
        "-app-port",
        "8002",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-placement-host-address",
        "placement:50005",
        "-scheduler-host-address",
        "scheduler-0:50006",
        # "-resources-path",
        # "/components",
        "-config",
        "/dapr-config/config.yml",
        "-log-level",
        "info",
        "-max-body-size",
        "2Gi",
      ]
    volumes:
      - "./components/:/components"
      - "./dapr-config/:/dapr-config"
    depends_on:
      placement:
        condition: service_started
      scheduler-0:
        condition: service_started
    networks:
      - network

  ############################
  # Frontend - Static web server
  ############################
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    networks:
      - network

  ############################
  # nginx - API Gateway / Reverse proxy
  ############################
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      nginx-dapr:
        condition: service_started
    networks:
      - network

  nginx-dapr:
    image: "${DAPR_RUNTIME_VERSION}"
    ports:
      - "3504:3500" # Dapr HTTP port (for debugging)
      - "50007:50001" # Dapr gRPC port
    command:
      [
        "./daprd",
        "-app-id",
        "nginx",
        "-app-channel-address",
        "nginx",
        "-app-port",
        "80",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-placement-host-address",
        "placement:50005",
        "-scheduler-host-address",
        "scheduler-0:50006",
        "-resources-path",
        "/components",
        "-config",
        "/dapr-config/config.yml",
        "-log-level",
        "info",
        "-max-body-size",
        "2Gi",
      ]
    volumes:
      - "./components/:/components"
      - "./dapr-config/:/dapr-config"
    depends_on:
      placement:
        condition: service_started
      scheduler-0:
        condition: service_started
    networks:
      - network

  ############################
  # File Generator - Generates large files for download
  ############################
  file-generator:
    environment:
      - DAPR_GRPC_ENDPOINT=http://file-generator-dapr:50001
      - DAPR_HTTP_ENDPOINT=http://file-generator-dapr:3500
    build:
      context: ./file-generator
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Read-only Docker socket access for memory monitoring
    depends_on:
      file-generator-dapr:
        condition: service_started
    networks:
      - network

  file-generator-dapr:
    image: "${DAPR_RUNTIME_VERSION}"
    ports:
      - "3505:3500" # Dapr HTTP port (for debugging)
      - "50008:50001" # Dapr gRPC port
    command:
      [
        "./daprd",
        "-app-id",
        "file-generator",
        "-app-channel-address",
        "file-generator",
        "-app-port",
        "8003",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-placement-host-address",
        "placement:50005",
        "-scheduler-host-address",
        "scheduler-0:50006",
        "-resources-path",
        "/components",
        "-config",
        "/dapr-config/config.yml",
        "-log-level",
        "info",
        "-max-body-size",
        "2Gi",
      ]
    volumes:
      - "./components/:/components"
      - "./dapr-config/:/dapr-config"
    depends_on:
      placement:
        condition: service_started
      scheduler-0:
        condition: service_started
    networks:
      - network

networks:
  network:
    driver: bridge
